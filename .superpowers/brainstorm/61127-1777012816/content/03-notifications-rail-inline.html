<style>
  :root {
    --font-mohave: "Mohave", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-cakemono: "Mohave", system-ui, sans-serif;  /* fallback since Cake Mono isn't loaded */

    --bg: #000;
    --glass: rgba(10, 10, 10, 0.70);
    --glass-dense: rgba(10, 10, 10, 0.85);
    --glass-subtle: rgba(10, 10, 10, 0.25);
    --glass-border: rgba(255, 255, 255, 0.08);

    --text: #EDEDED;
    --text-2: #B5B5B5;
    --text-3: #8A8A8A;
    --text-mute: #6A6A6A;

    --ops-accent: #6F94B0;
    --olive: #9DB582;
    --tan: #C4A868;
    --rose: #B58289;
    --brick: #93321A;

    --olive-soft: rgba(157, 181, 130, 0.12);
    --olive-line: rgba(157, 181, 130, 0.30);
    --tan-soft: rgba(196, 168, 104, 0.12);
    --tan-line: rgba(196, 168, 104, 0.30);
    --rose-soft: rgba(181, 130, 137, 0.12);
    --rose-line: rgba(181, 130, 137, 0.30);

    --line: rgba(255, 255, 255, 0.10);
    --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  }
  html, body { margin: 0; background: #111; color: #EDEDED; font-family: var(--font-mohave); }
  .hide-scrollbar { scrollbar-width: none; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  [data-lucide] { display: inline-block; stroke: currentColor; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
  .artboard-label {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--text-2);
    margin-bottom: 10px;
  }
  .intro { padding: 24px 24px 0; }
  .intro h1 { font-family: var(--font-mohave); font-weight: 300; text-transform: uppercase; letter-spacing: 0.02em; font-size: 22px; margin: 0 0 6px; }
  .intro p { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-3); margin: 0; }
  .board-wrap { padding: 24px; display: flex; flex-direction: column; gap: 40px; }
  .shell-frame { position: relative; width: 100%; aspect-ratio: 1600 / 900; border: 1px solid rgba(255,255,255,0.10); border-radius: 2px; overflow: hidden; background: #000; }
</style>
</head>

<script>
// ─── data.js ────────────────────────────────────────────────────────────────

  system: { label: "SYS", icon: "activity", tone: "ambient" },
  project_assigned: { label: "PROJECT", icon: "briefcase", tone: "info" },
  task_assigned: { label: "TASK", icon: "square-check", tone: "info" },
  task_completed: { label: "DONE", icon: "check", tone: "ambient" },
  schedule_change: { label: "SCHEDULE", icon: "calendar-clock", tone: "attn" },
  expense_submitted: { label: "EXPENSE", icon: "receipt", tone: "attn" },
  expense_approved: { label: "EXP", icon: "receipt-text", tone: "ambient" },
  duplicates_found: { label: "DUPES", icon: "copy", tone: "critical" },

  agent_suggestion: { label: "AGENT", icon: "bot", tone: "info" },

};
window.TONE_COLOR = {
  critical: "var(--rose)",
  attn: "var(--tan)",
  info: "var(--text-2)",
  ambient: "var(--text-mute)",
};
window.SAMPLE_NOTIFS = [
  { id: "n1", type: "role_needed", persistent: true, title: "Role needed: Site lead", body: "PROJ-00247 · 1524 Harbour Ln · starts 08:00 Thu", actionLabel: "ASSIGN", actionUrl: "/projects/00247", minutesAgo: 2 },
  { id: "n2", type: "duplicates_found", persistent: true, title: "4 possible duplicate clients", body: "Matched on phone + last name. Review before sync.", actionLabel: "REVIEW", actionUrl: "/clients?dupes=1", minutesAgo: 8 },
  { id: "n3", type: "mention", persistent: false, title: "Marcus mentioned you", body: "On PROJ-00251 — \"Waiting on your quote before Fri.\"", actionLabel: "OPEN", actionUrl: "/projects/00251", minutesAgo: 14 },

  { id: "n5", type: "expense_submitted", persistent: false, title: "$284.50 expense · J. Park", body: "Home Depot — roofing materials · PROJ-00239", actionLabel: "APPROVE", actionUrl: "/accounting/expenses", minutesAgo: 41 },
  { id: "n6", type: "trial_expiry", persistent: true, title: "Trial ends in 3 days", body: "Add payment before Apr 26 to avoid lockout.", actionLabel: "PAY", actionUrl: "/settings/billing", minutesAgo: 64 },

  { id: "n9", type: "mention", persistent: false, title: "K. Alvarez mentioned you", body: "On invoice INV-00412 — \"Please cc accounting.\"", actionLabel: "OPEN", actionUrl: "/invoices/00412", minutesAgo: 188 },
  { id: "n10", type: "task_assigned", persistent: false, title: "Task: Confirm crane rental", body: "Due Thu 17:00 · assigned by M. Chen", actionLabel: "ACK", actionUrl: "/tasks", minutesAgo: 245 },
  { id: "n11", type: "gmail_sync", persistent: false, title: "Gmail sync complete", body: "84 threads synced · 3 matched to clients", actionLabel: null, actionUrl: null, minutesAgo: 312 },
  { id: "n12", type: "pipeline_complete", persistent: false, title: "PROJ-00231 closed", body: "Final invoice sent · $8,240 · 4 day turnaround", actionLabel: "VIEW", actionUrl: "/projects/00231", minutesAgo: 380 },
  { id: "n13", type: "agent_suggestion", persistent: false, title: "Agent drafted 3 follow-ups", body: "For leads cold >14 days · review before send", actionLabel: "REVIEW", actionUrl: "/agent", minutesAgo: 510 },
  { id: "n14", type: "expense_approved", persistent: false, title: "Expense approved · $124.90", body: "Your receipt from Mon was cleared.", actionLabel: null, actionUrl: null, minutesAgo: 1440 },
];
window.fmtRel = (min) => {
  if (min < 1) return "now";
  if (min < 60) return `${min}m`;
  if (min < 1440) return `${Math.floor(min/60)}h`;
  return `${Math.floor(min/1440)}d`;
};
window.fmtAbs = (min) => {
  const now = new Date(); now.setHours(9, 42, 0, 0);
  const then = new Date(now.getTime() - min * 60000);
  const h = String(then.getHours()).padStart(2, "0");
  const m = String(then.getMinutes()).padStart(2, "0");
  return `${h}:${m}`;
};
window.buildNotifs = (n) => {
  const out = [];
  for (let i = 0; i < n; i++) {
    const base = window.SAMPLE_NOTIFS[i % window.SAMPLE_NOTIFS.length];
    out.push({ ...base, id: `g${i}`, minutesAgo: base.minutesAgo + Math.floor(i / window.SAMPLE_NOTIFS.length) * 600 });
  }
  return out;
};
</script>

<script type="text/babel" data-presets="react">
// ─── Shared: Icon + Shell + Sidebar + TopBar + Backdrop + FauxDashboard ─────
const Icon = ({ name, size = 16, stroke = 1.5, style, className }) => (
  <i data-lucide={name} style={{ width: size, height: size, strokeWidth: stroke, ...style }} className={className} />
);
window.Icon = Icon;

function Sidebar() {
  const items = [
    { icon: "layout-dashboard", label: "DASH", active: true },
    { icon: "briefcase", label: "PROJ" },
    { icon: "calendar", label: "SCHED" },
    { icon: "users", label: "CLI" },
    { icon: "map", label: "MAP" },
    { icon: "git-branch", label: "PIPE" },
    { icon: "inbox", label: "INBOX" },
    { icon: "file-text", label: "EST" },
    { icon: "package", label: "INV" },
    { icon: "receipt", label: "INV" },
  ];
  return (
    <div style={{
      position: "absolute", top: 0, left: 0, bottom: 0, width: 72,
      background: "var(--glass)", backdropFilter: "blur(20px) saturate(1.2)",
      WebkitBackdropFilter: "blur(20px) saturate(1.2)",
      borderRight: "1px solid var(--glass-border)",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "14px 0", gap: 2, zIndex: 9,
    }}>
      <div style={{ width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 8, color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: 18, fontWeight: 600, letterSpacing: "0.05em" }}>
        ⧗
      </div>
      {items.map((it) => (
        <div key={it.label} style={{
          width: 52, height: 44, borderRadius: 6,
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          gap: 2, cursor: "pointer",
          background: it.active ? "rgba(255,255,255,0.06)" : "transparent",
          color: it.active ? "var(--text)" : "var(--text-3)",
          position: "relative",
        }}>
          {it.active && (<div style={{ position: "absolute", left: -10, top: "50%", transform: "translateY(-50%)", width: 2, height: 18, background: "var(--text)" }} />)}
          <Icon name={it.icon} size={16} />
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 7.5, letterSpacing: "0.08em", fontWeight: 400 }}>{it.label}</span>
        </div>
      ))}
    </div>
  );
}

function TopBar({ title = "DASHBOARD" }) {
  return (
    <div style={{
      position: "absolute", top: 0, left: 72, right: 0, height: 56,
      background: "var(--glass)", backdropFilter: "blur(20px) saturate(1.2)",
      WebkitBackdropFilter: "blur(20px) saturate(1.2)",
      borderBottom: "1px solid var(--glass-border)",
      display: "flex", alignItems: "center", padding: "0 16px",
      zIndex: 8,
    }}>
      <h1 style={{
        fontFamily: "var(--font-mohave)", fontWeight: 300,
        fontSize: 22, textTransform: "uppercase", color: "var(--text)",
        margin: 0, letterSpacing: "0.02em",
      }}>{title}</h1>
      <div style={{ flex: 1 }} />
      <div style={{
        display: "flex", alignItems: "center", gap: 6, height: 40,
        padding: "0 10px", borderRadius: 2.5,
        background: "var(--glass-subtle)", border: "1px solid rgba(255,255,255,0.06)",
        width: 220, color: "var(--text-3)",
      }}>
        <Icon name="search" size={14} />
        <span style={{ fontFamily: "var(--font-mohave)", fontSize: 13 }}>Search</span>
        <span style={{ marginLeft: "auto", fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)", background: "rgba(255,255,255,0.06)", border: "1px solid var(--line)", borderRadius: 3, padding: "1px 5px" }}>⌘K</span>

}

function Backdrop() {
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", background: "#000" }}>
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 30% 20%, rgba(111,148,176,0.06), transparent 55%), radial-gradient(ellipse at 80% 70%, rgba(196,168,104,0.04), transparent 50%)" }} />
      <svg width="100%" height="100%" style={{ position: "absolute", inset: 0, opacity: 0.35 }}>
        <defs>

            <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.025)" strokeWidth="1"/>

        <rect width="100%" height="100%" fill="url(#grid)"/>

}

          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: "0.16em" }}>PENDING</span>

      </div>
      <div style={boxStyle}>
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.16em" }}>// THIS WEEK</div>
        <div style={{ display: "flex", gap: 4, marginTop: 10, alignItems: "flex-end", height: 52 }}>
          {[40,62,48,72,55,80,38].map((h,i) => (
            <div key={i} style={{ flex: 1, background: "rgba(255,255,255,0.15)", height: `${h}%`, borderRadius: 2 }}/>
          ))}

      </div>
      <div style={boxStyle}>

        <div style={{ marginTop: 8 }}>

                <div style={{ width: `${w}%`, height: "100%", background: "rgba(255,255,255,0.35)", borderRadius: 2 }}/>

              <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text)" }}>{n}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{ ...boxStyle, gridColumn: "1 / 3" }}>
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.16em" }}>// TODAY'S JOBS</div>
        <div style={{ marginTop: 8 }}>
          {[["08:00", "1524 HARBOUR LN", "ROOFING", "IN PROGRESS"],["11:30", "88 BLOOR ST W", "INSPECTION", "QUEUED"],["14:00", "412 DUNDAS AVE", "REPAIR", "QUEUED"],["16:30", "7 KING ST E", "ESTIMATE", "QUEUED"]].map(([t,a,k,s],i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr 100px 100px", gap: 12, padding: "6px 0", borderTop: i ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)" }}>{t}</span>
              <span style={{ fontFamily: "var(--font-mohave)", fontSize: 13, color: "var(--text)" }}>{a}</span>

function Shell({ children, title }) {
  return (
    <div style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden", background: "#000" }}>
      <Backdrop />
      <Sidebar />
      <TopBar title={title} />
      <FauxDashboard />
      {children}

}
window.Shell = Shell;
</script>

<script type="text/babel" data-presets="react">
// ─── RailFeed (Variation 01) ────────────────────────────────────────────────
const feedBtnIcon = { width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 2.5, border: "none", background: "transparent", color: "var(--text-3)", cursor: "pointer" };
const feedBtnText = { fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.14em", color: "var(--text-3)", background: "transparent", border: "none", cursor: "pointer", padding: 0 };
const feedChipStyle = { fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.12em", padding: "4px 8px", borderRadius: 2.5, border: "1px solid rgba(255,255,255,0.08)", cursor: "pointer" };
const feedActionPrimary = { fontFamily: "var(--font-mohave)", fontWeight: 500, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", padding: "5px 9px", borderRadius: 2.5, background: "transparent", border: "1px solid", cursor: "pointer", display: "inline-flex", alignItems: "center", color: "var(--text)" };
const feedActionSecondary = { fontFamily: "var(--font-mohave)", fontWeight: 500, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", padding: "5px 9px", borderRadius: 2.5, background: "transparent", border: "1px solid rgba(255,255,255,0.08)", color: "var(--text-3)", cursor: "pointer" };

function FeedSectionLabel({ children }) {
  return (
    <div style={{ padding: "10px 14px 4px", display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text-mute)", letterSpacing: "0.2em" }}>// {children}</span>
      <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.04)" }} />
    </div>
  );
}

function FeedCard({ notif, compact, expanded, onToggle }) {
  const [hover, setHover] = React.useState(false);
  const meta = window.NOTIF_TYPES[notif.type] || { label: notif.type, icon: "circle", tone: "info" };
  const toneColor = window.TONE_COLOR[meta.tone];
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={onToggle} style={{
      position: "relative", padding: compact ? "8px 14px 8px 18px" : "10px 14px 10px 18px",
      borderBottom: "1px solid rgba(255,255,255,0.04)", cursor: "pointer",
      background: hover ? "rgba(255,255,255,0.03)" : "transparent",
      transition: "background 150ms var(--ease-smooth)",
    }}>
      <div style={{ position: "absolute", left: 0, top: 8, bottom: 8, width: notif.persistent ? 2 : 1, background: notif.persistent ? toneColor : "rgba(255,255,255,0.08)" }} />
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3, whiteSpace: "nowrap" }}>
        <Icon name={meta.icon} size={11} style={{ color: toneColor, flexShrink: 0 }} />
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.14em", color: toneColor, fontWeight: 500 }}>{meta.label}</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)" }}>::</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-3)" }}>{window.fmtRel(notif.minutesAgo)} ago</span>
        <div style={{ flex: 1 }} />
        {!notif.persistent && (<button style={{ ...feedBtnIcon, opacity: hover ? 1 : 0, transition: "opacity 120ms" }}><Icon name="x" size={11} /></button>)}
      </div>
      <div style={{ fontFamily: "var(--font-mohave)", fontSize: 14, color: "var(--text)", lineHeight: 1.3, marginBottom: 2 }}>{notif.title}</div>
      {!compact && notif.body && (
        <div style={{ fontFamily: "var(--font-mohave)", fontSize: 12, color: "var(--text-3)", lineHeight: 1.4, display: "-webkit-box", WebkitLineClamp: expanded ? 99 : 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{notif.body}</div>
      )}
      {notif.actionLabel && (
        <div style={{ display: "flex", gap: 4, marginTop: hover || expanded ? 8 : 0, maxHeight: hover || expanded ? 40 : 0, overflow: "hidden", transition: "max-height 180ms var(--ease-smooth), margin-top 180ms var(--ease-smooth)" }}>
          <button style={{ ...feedActionPrimary, color: toneColor, borderColor: toneColor === "var(--rose)" ? "var(--rose-line)" : toneColor === "var(--tan)" ? "var(--tan-line)" : "rgba(255,255,255,0.15)" }}>
            {notif.actionLabel} <Icon name="arrow-right" size={10} style={{ marginLeft: 4 }} />
          </button>
          <button style={feedActionSecondary}>SNOOZE</button>
          {!notif.persistent && <button style={feedActionSecondary}>DISMISS</button>}
        </div>
      )}
    </div>
  );
}

function RailFeed({ notifs, compact = false, open = true }) {
  const [expandedId, setExpandedId] = React.useState(null);
  const [filter, setFilter] = React.useState("all");
  const pinned = notifs.filter(n => n.persistent);
  const rest = notifs.filter(n => !n.persistent);
  return (
    <div style={{
      position: "absolute", top: 72, right: open ? 0 : -360, bottom: 16, width: 360,
      transition: "right 260ms var(--ease-smooth)",

<script type="text/babel" data-presets="react">
// ─── RailTelemetry (Variation 02) ───────────────────────────────────────────
const telMiniBtn = { fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: "0.14em", padding: "3px 7px", borderRadius: 2.5, background: "transparent", border: "1px solid rgba(255,255,255,0.08)", color: "var(--text-3)", cursor: "pointer" };

function TelemetryRow({ notif, meta, toneColor, active, onClick }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={onClick} style={{
      cursor: "pointer",
      background: active ? "rgba(255,255,255,0.04)" : hover ? "rgba(255,255,255,0.02)" : "transparent",

        <span style={{ fontSize: 10, color: "var(--text-mute)" }}>{window.fmtAbs(notif.minutesAgo)}</span>
        <span style={{ fontSize: 9, color: toneColor, letterSpacing: "0.14em", fontWeight: 500 }}>{meta.label.padEnd(8, " ")}</span>

        <div style={{ padding: "0 12px 10px 64px", display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ fontFamily: "var(--font-mohave)", fontSize: 11.5, color: "var(--text-3)", lineHeight: 1.5, borderLeft: "1px solid rgba(255,255,255,0.1)", paddingLeft: 8 }}>{notif.body}</div>
        </div>
      )}
    </div>
  );
}

function RailTelemetry({ notifs, open = true }) {
  const [activeId, setActiveId] = React.useState(null);
  const [autoScroll, setAutoScroll] = React.useState(true);
  const sorted = [...notifs].sort((a, b) => a.minutesAgo - b.minutesAgo);
  let lastHour = -1;
  return (
    <div style={{
      position: "absolute", top: 72, right: open ? 0 : -380, bottom: 16, width: 380,

      zIndex: 10, overflow: "hidden", fontFamily: "var(--font-mono)",

        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--olive)", boxShadow: "0 0 8px var(--olive)", animation: "pulse 2s ease-in-out infinite" }} />
        <span style={{ fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.18em" }}>//</span>
        <span style={{ fontFamily: "var(--font-mohave)", fontWeight: 500, fontSize: 13, color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.1em" }}>COMMS</span>
        <span style={{ fontSize: 10, color: "var(--text-3)", letterSpacing: "0.14em" }}>:: CH-01 :: {notifs.length} EVT</span>
        <div style={{ flex: 1 }} />
        <button onClick={() => setAutoScroll(!autoScroll)} style={{ ...telMiniBtn, color: autoScroll ? "var(--olive)" : "var(--text-3)", borderColor: autoScroll ? "var(--olive-line)" : "rgba(255,255,255,0.08)" }}>{autoScroll ? "LIVE" : "HOLD"}</button>
        <button style={telMiniBtn}>FILTER</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "52px 70px 1fr 28px", padding: "6px 12px", gap: 8, borderBottom: "1px solid rgba(255,255,255,0.04)", fontSize: 9, color: "var(--text-mute)", letterSpacing: "0.2em" }}>
        <span>TIME</span><span>TYPE</span><span>MESSAGE</span><span></span>
      </div>
      <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden" }} className="hide-scrollbar">
        {sorted.map((n, i) => {
          const meta = window.NOTIF_TYPES[n.type] || { label: n.type, icon: "circle", tone: "info" };
          const toneColor = window.TONE_COLOR[meta.tone];
          const hour = Math.floor(n.minutesAgo / 60);
          const showDivider = hour !== lastHour;
          lastHour = hour;
          const isActive = activeId === n.id;
          return (
            <React.Fragment key={n.id}>

                  <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.04)" }} />
                </div>
              )}
              <TelemetryRow notif={n} meta={meta} toneColor={toneColor} active={isActive} onClick={() => setActiveId(isActive ? null : n.id)} />
            </React.Fragment>
          );
        })}
      </div>
      <div style={{ display: "flex", alignItems: "center", padding: "6px 12px", gap: 8, borderTop: "1px solid rgba(255,255,255,0.06)", fontSize: 9, color: "var(--text-mute)", letterSpacing: "0.14em" }}>

        <div style={{ flex: 1 }} />

      <style>{`@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }`}</style>
    </div>

}
window.RailTelemetry = RailTelemetry;
</script>

<script type="text/babel" data-presets="react">
// ─── RailTriage (Variation 03) ──────────────────────────────────────────────
const triageIconBtn = { width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 2.5, border: "none", background: "transparent", color: "var(--text-3)", cursor: "pointer" };
const triageSecondaryBtn = { fontFamily: "var(--font-mohave)", fontWeight: 500, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", padding: "4px 9px", borderRadius: 2.5, background: "transparent", border: "1px solid rgba(255,255,255,0.08)", color: "var(--text-3)", cursor: "pointer" };

function TriageRow({ notif, tone, expanded, onToggle }) {
  const [hover, setHover] = React.useState(false);
  const meta = window.NOTIF_TYPES[notif.type] || { label: notif.type, icon: "circle" };
  const showAccent = tone.color === "var(--rose)" || tone.color === "var(--tan)";
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={onToggle} style={{
      position: "relative", padding: "9px 14px 9px 14px", cursor: "pointer",
      background: hover || expanded ? "rgba(255,255,255,0.03)" : "transparent",
      borderTop: "1px solid rgba(255,255,255,0.04)",
      transition: "background 120ms var(--ease-smooth)",
    }}>
      {showAccent && (
        <div style={{ position: "absolute", left: 0, top: 10, bottom: 10, width: notif.persistent ? 2 : 1, background: tone.color, opacity: notif.persistent ? 0.85 : 0.45 }} />
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 8, whiteSpace: "nowrap" }}>
        <div style={{ width: 20, height: 20, borderRadius: 2.5, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: showAccent ? tone.soft : "rgba(255,255,255,0.04)", border: `1px solid ${showAccent ? tone.line : "rgba(255,255,255,0.06)"}`, color: showAccent ? tone.color : "var(--text-3)" }}>
          <Icon name={meta.icon} size={12} />
        </div>
        <span style={{ fontFamily: "var(--font-mohave)", fontSize: 13.5, color: "var(--text)", flex: 1, overflow: "hidden", textOverflow: "ellipsis", minWidth: 0 }}>{notif.title}</span>
        {notif.actionLabel && !expanded && !hover && (
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: "0.14em", color: tone.color, opacity: 0.75, flexShrink: 0 }}>{notif.actionLabel}</span>
        )}
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)", flexShrink: 0, minWidth: 24, textAlign: "right" }}>{window.fmtRel(notif.minutesAgo)}</span>
      </div>
      <div style={{ maxHeight: expanded ? 120 : 0, overflow: "hidden", transition: "max-height 200ms var(--ease-smooth)", paddingLeft: 28 }}>
        {notif.body && (<div style={{ fontFamily: "var(--font-mohave)", fontSize: 12, color: "var(--text-3)", lineHeight: 1.45, marginTop: 6 }}>{notif.body}</div>)}
        <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
          {notif.actionLabel && (
            <button onClick={(e)=>e.stopPropagation()} style={{ fontFamily: "var(--font-mohave)", fontWeight: 500, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", padding: "4px 9px", borderRadius: 2.5, background: tone.soft, border: `1px solid ${tone.line}`, color: showAccent ? tone.color : "var(--text)", cursor: "pointer" }}>{notif.actionLabel} →</button>
          )}
          <button onClick={(e)=>e.stopPropagation()} style={triageSecondaryBtn}>SNOOZE</button>
          {!notif.persistent && (<button onClick={(e)=>e.stopPropagation()} style={triageSecondaryBtn}>DISMISS</button>)}
        </div>
      </div>
    </div>
  );
}

function RailTriage({ notifs, open = true }) {
  const [expandedId, setExpandedId] = React.useState(null);
  const [filter, setFilter] = React.useState("all");
  const withTone = (n) => {
    const meta = window.NOTIF_TYPES[n.type] || { tone: "info" };
    return meta.tone === "info" ? "ambient" : meta.tone;
  };
  const counts = { critical: 0, attn: 0, ambient: 0 };
  notifs.forEach(n => counts[withTone(n)]++);
  const visible = filter === "all" ? notifs : notifs.filter(n => withTone(n) === filter);
  const CHIPS = [
    { key: "all", label: "ALL", color: "var(--text)", count: notifs.length },
    { key: "critical", label: "CRITICAL", color: "var(--rose)", line: "var(--rose-line)", soft: "var(--rose-soft)", count: counts.critical },
    { key: "attn", label: "ATTENTION", color: "var(--tan)", line: "var(--tan-line)", soft: "var(--tan-soft)", count: counts.attn },
    { key: "ambient", label: "AMBIENT", color: "var(--text-3)", line: "rgba(255,255,255,0.12)", soft: "rgba(255,255,255,0.04)", count: counts.ambient },
  ];
  const toneOf = (n) => {
    const t = withTone(n);
    if (t === "critical") return { color: "var(--rose)", line: "var(--rose-line)", soft: "var(--rose-soft)" };
    if (t === "attn") return { color: "var(--tan)", line: "var(--tan-line)", soft: "var(--tan-soft)" };
    return { color: "var(--text-3)", line: "rgba(255,255,255,0.08)", soft: "rgba(255,255,255,0.04)" };
  };
  return (
    <div style={{
      position: "absolute", top: 72, right: open ? 0 : -360, bottom: 16, width: 360,
      transition: "right 260ms var(--ease-smooth)",
      display: "flex", flexDirection: "column",
      background: "var(--glass)", backdropFilter: "blur(24px) saturate(1.3)",
      WebkitBackdropFilter: "blur(24px) saturate(1.3)",
      border: "1px solid rgba(255,255,255,0.14)", borderRight: "none",
      zIndex: 10, overflow: "hidden",
    }}>
      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%)" }} />
      <div style={{ display: "flex", alignItems: "center", padding: "12px 14px 10px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.16em" }}>//</span>
        <span style={{ fontFamily: "var(--font-mohave)", fontWeight: 500, fontSize: 13, color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.08em", marginLeft: 6 }}>NOTIFICATIONS</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)", marginLeft: 8 }}>{notifs.length}</span>
        <div style={{ flex: 1 }} />
        <button style={triageIconBtn}><Icon name="bell-off" size={12} /></button>
        <button style={triageIconBtn}><Icon name="check-check" size={12} /></button>
      </div>
      <div style={{ display: "flex", gap: 4, padding: "8px 14px 10px", borderBottom: "1px solid rgba(255,255,255,0.06)", flexWrap: "wrap" }}>
        {CHIPS.map(c => {
          const active = filter === c.key;
          return (
            <button key={c.key} onClick={() => setFilter(c.key)} style={{
              fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.12em",
              padding: "4px 8px", borderRadius: 2.5, cursor: "pointer",
              display: "inline-flex", alignItems: "center", gap: 5,
              background: active ? (c.soft || "rgba(255,255,255,0.08)") : "transparent",
              border: `1px solid ${active ? (c.line || "rgba(255,255,255,0.18)") : "rgba(255,255,255,0.08)"}`,
              color: active ? c.color : "var(--text-3)",
              transition: "all 120ms",
            }}>
              {c.key !== "all" && (<span style={{ width: 4, height: 4, background: c.color, opacity: active ? 1 : 0.6 }} />)}
              {c.label}
              <span style={{ color: active ? c.color : "var(--text-mute)", opacity: active ? 0.7 : 1 }}>{c.count}</span>
            </button>
          );
        })}
      </div>
      <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden" }} className="hide-scrollbar">
        {visible.map(n => (
          <TriageRow key={n.id} notif={n} tone={toneOf(n)} expanded={expandedId === n.id} onToggle={() => setExpandedId(expandedId === n.id ? null : n.id)} />
        ))}
      </div>
      <div style={{ display: "flex", alignItems: "center", padding: "8px 14px", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.14em" }}>LAST SYNC {window.fmtAbs(1)}</span>
        <div style={{ flex: 1 }} />
        <button style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.14em", color: "var(--text-3)", background: "transparent", border: "none", cursor: "pointer", padding: 0 }}>VIEW ALL →</button>
      </div>
    </div>
  );
}
window.RailTriage = RailTriage;
</script>

<script type="text/babel" data-presets="react">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square">

          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text)", fontFeatureSettings: '"tnum" 1, "zero" 1', lineHeight: 1, writingMode: "vertical-rl", transform: "rotate(180deg)" }}>{count}</span>
        )}
        <span style={{ writingMode: "vertical-rl", transform: "rotate(180deg)", fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text-2)", letterSpacing: "0.18em", textTransform: "uppercase", whiteSpace: "nowrap" }}>
          {open ? "CLOSE" : "NOTIFICATIONS"}
        </span>
      </div>
    </div>
  );
}
window.NotifTab = NotifTab;
</script>

<script type="text/babel" data-presets="react">
// ─── App ────────────────────────────────────────────────────────────────────
function App() {
  const [openRails, setOpenRails] = React.useState({ feed: true, telemetry: true, triage: true });
  const [notifCount, setNotifCount] = React.useState(14);
  const notifs = React.useMemo(() => window.buildNotifs(notifCount), [notifCount]);
  React.useEffect(() => {
    if (window.lucide) {
      const t = setTimeout(() => window.lucide.createIcons(), 50);
      return () => clearTimeout(t);
    }
  });

  const artboards = [
    { id: "feed", label: "01 · FEED — refined inbox",          Cmp: window.RailFeed,      railW: 360 },
    { id: "telemetry", label: "02 · TELEMETRY — live comms stream", Cmp: window.RailTelemetry, railW: 380 },
    { id: "triage", label: "03 · TRIAGE — priority-bucketed",   Cmp: window.RailTriage,    railW: 360 },
  ];

  return (
    <div>
      <div className="intro">
        <h1>Notifications Rail — 3 directions</h1>
        <p>// Vertical right-edge rails. Each embodies a different theory of the problem. All OPS design system.</p>
        <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-3)", letterSpacing: "0.12em" }}>NOTIFICATION COUNT :: {notifCount}</span>
          <input type="range" min="0" max="40" value={notifCount} onChange={e => setNotifCount(Number(e.target.value))} style={{ width: 200 }} />
          <button onClick={() => setOpenRails({ feed: !openRails.feed, telemetry: !openRails.telemetry, triage: !openRails.triage })} style={{ fontFamily: "var(--font-mono)", fontSize: 10, padding: "4px 10px", background: "rgba(255,255,255,0.06)", color: "var(--text)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 2.5, cursor: "pointer", letterSpacing: "0.14em" }}>
            TOGGLE RAILS
          </button>
        </div>
      </div>

      <div className="board-wrap">
        {artboards.map(({ id, label, Cmp, railW }) => (
          <div key={id}>
            <div className="artboard-label">{label}</div>
            <div className="shell-frame">
              <Shell title="DASHBOARD">
                <Cmp notifs={notifs} open={openRails[id]} onDismiss={() => {}} />
                <NotifTab open={openRails[id]} onToggle={() => setOpenRails(s => ({...s, [id]: !s[id]}))} count={notifs.length} railWidth={railW} panelHeight={820} fill={id === "telemetry" ? "rgba(6,6,8,0.82)" : "var(--glass)"} />
              </Shell>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
