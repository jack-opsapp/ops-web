<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OPS — Unified Table System · CORRECTED (P6-2 rework)</title>
<link rel="stylesheet" href="https://use.typekit.net/dbh0pet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Mohave:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  /* canonical OPS tokens (colors_and_type.css :root) */
  --bg:#000; --bg-panel:#0A0A0A;
  --text:#EDEDED; --text-2:#B5B5B5; --text-3:#8A8A8A; --text-mute:#6A6A6A;
  --accent:#6F94B0; --accent-hover:#7FA3BD;
  --olive:#9DB582; --tan:#C4A868; --rose:#B58289; --brick:#93321A;
  --fin-current:#9DB582; --fin-receivables:#D4A574; --fin-overdue:#93321A;
  --agent:#8A7FB8;
  --glass:rgba(18,18,20,0.58); --glass-subtle:rgba(18,18,20,0.40); --glass-border:rgba(255,255,255,0.09);
  --line:rgba(255,255,255,0.10); --line-soft:rgba(255,255,255,0.05);
  --fill:rgba(255,255,255,0.14); --fill-dim:rgba(255,255,255,0.06);
  --hover:rgba(255,255,255,0.05); --active:rgba(255,255,255,0.08); --input:rgba(255,255,255,0.04);
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --body:"Mohave",system-ui,sans-serif;
  --cake:"cake-mono","JetBrains Mono",monospace;
  --ease:cubic-bezier(0.22,1,0.36,1);
  /* layout */
  --rail:64px; --topbar:56px; --gutter:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;overflow:hidden}
.mono{font-family:var(--mono);font-feature-settings:"tnum" 1,"zero" 1}
.cake{font-family:var(--cake);font-weight:300;text-transform:uppercase}

/* ════ APP SHELL — frames the full-bleed content ════ */
.app{display:grid;grid-template-columns:var(--rail) 1fr;height:100vh;width:100vw}

/* left sidebar rail */
.rail{border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;background:var(--bg)}
.rail .mark{width:26px;height:26px;color:var(--text);margin-bottom:14px}
.rail a{width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s var(--ease);position:relative}
.rail a svg{width:20px;height:20px}
.rail a:hover{color:var(--text-2);background:var(--hover)}
.rail a.on{color:var(--text)}
.rail a.on::before{content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:2px;border-radius:2px;background:var(--text-2)}
.rail .spacer{flex:1}

/* main column = topbar + content */
.main{display:flex;flex-direction:column;min-width:0;min-height:0}

/* top bar */
.topbar{height:var(--topbar);flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:0 var(--gutter);border-bottom:1px solid var(--line);background:var(--bg)}
.topbar h1{font-family:var(--cake);font-weight:300;text-transform:uppercase;font-size:22px;letter-spacing:.01em;color:var(--text);line-height:1}
.topbar .op{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3)}
.topbar .op b{color:var(--text-mute);font-weight:400}
.topbar .tbright{margin-left:auto;display:flex;align-items:center;gap:10px;color:var(--text-3)}
.topbar .tbright svg{width:18px;height:18px}
.topbar .avatar{width:28px;height:28px;border-radius:50%;background:var(--input);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--text-2)}

/* surface switcher — mock control only (simulates route nav) */
.surfaces{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-left:6px}
.surfaces button{appearance:none;background:transparent;border:0;border-right:1px solid var(--line);
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);
  padding:0 11px;height:26px;cursor:pointer;transition:.15s var(--ease)}
.surfaces button:last-child{border-right:0}
.surfaces button:hover{color:var(--text-2);background:var(--hover)}
.surfaces button[aria-selected="true"]{color:var(--text);background:var(--active)}

/* ════ CONTENT AREA — FULL-BLEED · single scroll region ════ */
.content{flex:1 1 auto;min-height:0;overflow:auto;position:relative;scrollbar-width:thin}
.content::-webkit-scrollbar{width:10px;height:10px}
.content::-webkit-scrollbar-thumb{background:var(--fill-dim);border-radius:5px;border:3px solid var(--bg)}

/* ── METRICS BAR — decoupled · canonical 28px look · SCROLLS UP & OUT ── */
.metricsbar{display:flex;align-items:stretch;gap:0;padding:14px var(--gutter) 13px;border-bottom:1px solid var(--line);
  background:var(--bg)}
.metric{display:flex;flex-direction:column;gap:2px;padding:0 26px;min-width:140px;flex:1 1 0}
.metric:first-child{padding-left:0}
.metric+.metric{border-left:1px solid var(--line-soft)}
.metric .ml{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);white-space:nowrap;margin-bottom:5px}
.metric .ml i{color:var(--text-mute);font-style:normal}
.metric .mv{display:flex;align-items:baseline;gap:6px;line-height:1}
.metric .mv .n{font-family:var(--mono);font-weight:600;font-size:28px;letter-spacing:-1px;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.metric .mv .n.tan{color:var(--tan)}.metric .mv .n.olive{color:var(--olive)}.metric .mv .n.rose{color:var(--rose)}
.metric .mv .t{font-family:var(--mono);font-size:11px}
.metric .mv .t.up{color:var(--olive)}.metric .mv .t.down{color:var(--olive)}.metric .mv .t.bad{color:var(--rose)}.metric .mv .t.flat{color:var(--text-mute)}
.metric .viz{height:24px;margin-top:6px}
.metric .ms{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--text-3);font-variant-numeric:tabular-nums;margin-top:auto;padding-top:3px}
.period{margin-left:auto;align-self:flex-start;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);
  border:1px solid var(--line);border-radius:5px;height:24px;display:inline-flex;align-items:center;gap:6px;padding:0 10px}
.period svg{width:11px;height:11px}

/* ── TOOLBAR — STICKY (pins at top:0) ── */
.toolbar{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line);
  display:flex;flex-direction:column;gap:8px;padding:9px var(--gutter)}
.tb-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* saved-view tabs (grid) */
.views{display:flex;align-items:center;gap:2px}
.viewtab{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);
  padding:0 10px;height:24px;display:inline-flex;align-items:center;border-radius:4px;cursor:pointer;transition:.15s var(--ease)}
.viewtab:hover{color:var(--text-2);background:var(--hover)}
.viewtab[data-on]{color:var(--text);background:var(--active)}
.viewtab.add{color:var(--text-mute)}
/* segment control (register seg + pipeline mode toggle) */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:var(--input)}
.seg button{appearance:none;background:transparent;border:0;border-right:1px solid var(--line);cursor:pointer;
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);
  height:24px;padding:0 10px;display:inline-flex;align-items:center;gap:5px;transition:.15s var(--ease)}
.seg button:last-child{border-right:0}
.seg button:hover{color:var(--text-2);background:var(--hover)}
.seg button[data-on]{color:var(--text);background:var(--active)}
.seg button svg{width:11px;height:11px}
.seg.mode{box-shadow:none}
.modewrap{display:inline-flex;align-items:center;gap:7px}
.modewrap .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-mute)}
/* search */
.search{display:inline-flex;align-items:center;gap:6px;height:28px;width:220px;max-width:32%;
  background:var(--input);border:1px solid var(--line);border-radius:5px;padding:0 9px}
.search svg{flex:0 0 auto;width:13px;height:13px;color:var(--text-3)}
.search input{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--text-2);font-family:var(--body);font-size:13px}
.search input::placeholder{color:var(--text-3)}
/* CTA — the one accent element */
.cta{height:28px;display:inline-flex;align-items:center;gap:6px;padding:0 13px;border-radius:5px;
  border:1px solid var(--accent);color:var(--accent);background:transparent;cursor:pointer;
  font-family:var(--cake);font-weight:300;font-size:14px;text-transform:uppercase;transition:.15s var(--ease)}
.cta:hover{background:var(--accent);color:#000}
/* density (grid) */
.density{display:inline-flex;height:24px;align-items:center;border:1px solid var(--line);border-radius:5px;overflow:hidden}
.density b{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);font-weight:400;cursor:pointer;
  padding:0 9px;height:22px;display:inline-flex;align-items:center;border-right:1px solid var(--line);transition:.15s var(--ease)}
.density b:last-child{border-right:0}
.density b:hover{color:var(--text-2)}
.density b[data-on]{color:var(--text);background:var(--active)}
/* chips */
.chips{display:inline-flex;gap:6px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);
  border:1px solid var(--line);border-radius:4px;padding:0 9px;height:23px;display:inline-flex;align-items:center;cursor:pointer;transition:.15s var(--ease)}
.chip:hover{color:var(--text-2);background:var(--hover)}
.chip[data-on]{color:var(--text);background:var(--active);border-color:rgba(255,255,255,0.18)}
.count{font-family:var(--mono);font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}
.statline{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--text-3);font-variant-numeric:tabular-nums;display:inline-flex;gap:8px;flex-wrap:wrap}
.statline .si b{font-weight:400;text-transform:uppercase}
.statline .si .sv{margin-left:6px}.statline .si .sv.olive{color:var(--olive)}.statline .si .sv.rose{color:var(--rose)}.statline .si .sv.def{color:var(--text-2)}
.statline .dot{color:var(--text-mute)}
.spacer{flex:1}

/* ── TABLE — full-bleed, sticky column header pins under toolbar ── */
.tbl{width:100%;border-collapse:separate;border-spacing:0;min-width:780px}
.tbl thead th{position:sticky;z-index:20;background:var(--bg);
  text-align:left;font-family:var(--mono);font-weight:400;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-3);padding:8px var(--gutter);border-bottom:1px solid var(--line);white-space:nowrap}
.tbl thead th:not(:first-child){padding-left:8px}
.tbl thead th.r{text-align:right;padding-right:var(--gutter)}
.tbl thead th .sort{display:inline-flex;align-items:center;gap:4px}
.tbl thead th[data-active] .sort{color:var(--text)}
/* frozen first col (grid) */
.grid thead th.frozen,.grid tbody td.frozen{position:sticky;left:0;background:var(--bg)}
.grid thead th.frozen{z-index:21}
.grid tbody td.frozen{z-index:5}
.tbl tbody td{padding:9px var(--gutter);border-bottom:1px solid rgba(255,255,255,0.045);vertical-align:middle;white-space:nowrap}
.tbl tbody td:not(:first-child){padding-left:8px}
.tbl tbody td.r{text-align:right;padding-right:var(--gutter)}
.tbl tbody tr{transition:background .12s var(--ease)}
.tbl tbody tr:hover td{background:var(--hover)}
.tbl tbody tr:hover td.frozen{background:#0c0c0d}
.tbl tbody tr[data-active] td{background:var(--active)}
.tbl tbody tr[data-active] td.frozen{background:#161618}
/* group header row (pipeline grouped) */
.grouprow td{background:var(--bg-panel);border-bottom:1px solid var(--line);padding:6px var(--gutter)}
.grouphdr{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-2)}
.grouphdr .gc{color:var(--text-mute)}
.grouphdr .gv{margin-left:auto;color:var(--text-3)}

.t-num{font-family:var(--mono);font-size:13px;color:var(--text);font-variant-numeric:tabular-nums}
.t-pri{font-family:var(--body);font-size:14px;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;display:block}
.t-meta{font-family:var(--body);font-size:14px;color:var(--text-3)}
.t-mono{font-family:var(--mono);font-size:13px;color:var(--text-2);font-variant-numeric:tabular-nums}
.t-mono.muted{color:var(--text-3)}.t-mono.olive{color:var(--olive)}.t-mono.rose{color:var(--rose)}.t-mono.tan{color:var(--tan)}.t-mono.def{color:var(--text)}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--input);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--text-2);flex:0 0 auto}
.cellflex{display:flex;align-items:center;gap:9px}
.tag{font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.12em;text-transform:uppercase;border-radius:4px;padding:2px 7px;border:1px solid;white-space:nowrap}
.tag.neutral{color:var(--text-2);background:rgba(255,255,255,0.05);border-color:var(--line)}
.tag.olive{color:var(--olive);background:rgba(157,181,130,.12);border-color:rgba(157,181,130,.30)}
.tag.tan{color:var(--tan);background:rgba(196,168,104,.12);border-color:rgba(196,168,104,.30)}
.tag.rose{color:var(--rose);background:rgba(181,130,137,.12);border-color:rgba(181,130,137,.30)}
.editcell{font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--fill);padding:0 2px 1px;color:var(--text);cursor:text}
.editcell.rose{color:var(--rose)}.editcell.muted{color:var(--text-3)}
.actions{display:inline-flex;align-items:center;gap:5px;height:23px;border:1px solid var(--line);border-radius:4px;padding:0 7px;cursor:pointer;
  font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);transition:.15s var(--ease)}
.actions:hover{color:var(--text-2);background:var(--hover)}
.progress{display:inline-flex;align-items:center;justify-content:flex-end;gap:9px}
.progress .track{width:56px;height:4px;border-radius:2px;background:var(--fill-dim);overflow:hidden;display:inline-block}
.progress .track i{display:block;height:100%;background:var(--text-2)}

/* floating scroll hint */
.hint{position:fixed;right:18px;bottom:16px;z-index:60;display:inline-flex;align-items:center;gap:8px;
  background:var(--glass);backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);
  border:1px solid var(--glass-border);border-radius:8px;padding:8px 12px;
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);
  transition:opacity .3s var(--ease)}
.hint b{color:var(--text-2);font-weight:500}
.hint.gone{opacity:0;pointer-events:none}
.hint svg{width:13px;height:13px;color:var(--text-mute)}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT RAIL -->
  <nav class="rail" aria-label="Primary">
    <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7l5-3 5 3v6l-5 3-5-3z"/><path d="M10 11l5-3 5 3v6l-5 3-5-3z" opacity=".5"/></svg>
    <a title="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></a>
    <a class="on" data-rail="projects" title="Projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7h18M3 12h18M3 17h18"/></svg></a>
    <a data-rail="pipeline" title="Pipeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 5h18l-7 8v6l-4-2v-4z"/></svg></a>
    <a data-rail="books" title="Books"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5a2 2 0 012-2h12v18H6a2 2 0 01-2-2z"/><path d="M8 7h7M8 11h7"/></svg></a>
    <a data-rail="catalog" title="Catalog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></a>
    <a data-rail="clients" title="Clients"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0112 0"/><path d="M16 6a3 3 0 010 6M21 20a6 6 0 00-4-5.6"/></svg></a>
    <span class="spacer"></span>
    <a title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg></a>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <h1 id="pagetitle">Projects</h1>
      <span class="op"><b>// </b>OPERATOR :: JACKSON</span>
      <div class="surfaces" role="tablist" aria-label="Surface (mock nav)">
        <button role="tab" aria-selected="true" data-s="projects">Projects</button>
        <button role="tab" aria-selected="false" data-s="pipeline">Pipeline</button>
        <button role="tab" aria-selected="false" data-s="books">Books</button>
        <button role="tab" aria-selected="false" data-s="catalog">Catalog</button>
        <button role="tab" aria-selected="false" data-s="clients">Clients</button>
      </div>
      <div class="tbright">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
        <span class="avatar">JS</span>
      </div>
    </header>

    <main class="content" id="content">
      <section class="metricsbar" id="metricsbar" aria-label="Metrics"></section>
      <div class="toolbar" id="toolbar"></div>
      <table class="tbl" id="tbl">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </main>
  </div>
</div>

<div class="hint" id="hint">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M6 13l6 6 6-6"/></svg>
  scroll the list — <b>metrics scroll away</b>, toolbar + header pin
</div>

<script>
(function(){
  var RM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ── mini-viz builders (SVG, tokenized) ── */
  function spark(pts,color){var w=120,h=24,max=Math.max.apply(null,pts),min=Math.min.apply(null,pts),r=(max-min)||1;
    var d=pts.map(function(p,i){return (i?'L':'M')+(i*(w/(pts.length-1))).toFixed(1)+' '+(h-2-((p-min)/r)*(h-6)).toFixed(1)}).join(' ');
    var area=d+' L'+w+' '+h+' L0 '+h+' Z';
    return '<svg class="viz" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" width="100%">'+
      '<path d="'+area+'" fill="'+color+'" opacity=".12"/>'+
      '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.4" vector-effect="non-scaling-stroke"/></svg>';}
  function bars(vals,color){var w=120,h=24,n=vals.length,bw=w/n*0.6,gap=w/n,max=Math.max.apply(null,vals)||1;
    var s='';for(var i=0;i<n;i++){var bh=Math.max(2,(vals[i]/max)*(h-3));s+='<rect x="'+(i*gap+(gap-bw)/2).toFixed(1)+'" y="'+(h-bh).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="1" fill="'+color+'" opacity="'+(0.4+0.6*vals[i]/max).toFixed(2)+'"/>'}
    return '<svg class="viz" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" width="100%">'+s+'</svg>';}
  function ramp(segs){var w=120,h=8,x=0,tot=segs.reduce(function(a,b){return a+b.v},0)||1,s='';

  function countUp(node,target,fmt){
    if(RM||!target){node.textContent=fmt?fmt(target):target;return;}
    var dur=800,t0=performance.now();
    function step(now){var p=Math.min(1,(now-t0)/dur);var e=1-Math.pow(1-p,3);
      var val=Math.round(target*e);node.textContent=fmt?fmt(val):val;if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  }

        '<div class="mv"><span class="n '+(m.tone||'')+'" data-cv="'+i+'">0</span>'+tr+'</div>'+

    }
    var modeToggle=d.modeToggle?'<div class="seg">'+d.modeToggle.map(function(s,i){return '<button'+(i===0?' data-on="1"':'')+'>'+s+'</button>'}).join('')+'</div>':'';
    var search='<label class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input placeholder="'+d.search+'" readonly></label>';
    var dens=d.density?'<div class="density"><b>COMPACT</b><b data-on="1">COMFY</b><b>SPACE</b></div>':'';
    var cta='<button class="cta">'+d.cta+'</button>';

    var row1='<div class="tb-row">'+lead+modeCtl+search+'<span class="spacer"></span>'+modeToggle+dens+cta+'</div>';
    var chips='<div class="chips">'+d.chips.map(function(c){return '<span class="chip"'+(c.on?' data-on="1"':'')+'>'+c.l+'</span>'}).join('')+'</div>';
    var cnt='<span class="count">'+d.rows.filter(function(r){return !r.group}).length+' shown</span>';
    var sl=d.statline?'<span class="statline">'+d.statline.map(function(s,i){return (i?'<span class="dot">·</span>':'')+'<span class="si"><b>'+s.b+'</b><span class="sv '+s.c+'">'+s.v+'</span></span>'}).join('')+'</span>':'';
    elT.innerHTML=row1+'<div class="tb-row">'+chips+cnt+sl+'</div>';

    /* sticky header offset = toolbar height */
    requestAnimationFrame(function(){
      var th=elT.offsetHeight;
      elH.querySelectorAll('th').forEach(function(x){x.style.top=th+'px'});
    });

    /* header */
    var hasFrozen=d.cols.some(function(c){return c.frozen});
    elH.innerHTML='<tr>'+d.cols.map(function(c){
      var cls=(c.r?'r ':'')+(c.frozen?'frozen':'');
      var inner=c.l?'<span class="sort">'+c.l+(c.active?' ▼':'')+'</span>':'';
      return '<th class="'+cls.trim()+'"'+(c.active?' data-active="1"':'')+'>'+inner+'</th>'}).join('')+'</tr>';

    /* rows */
    var ncols=d.cols.length;
    elB.innerHTML=d.rows.map(function(r,ri){
      if(r.group){return '<tr class="grouprow"><td colspan="'+ncols+'"><div class="grouphdr">'+r.group.stage+
        '<span class="gc">'+r.group.count+'</span><span class="gv">'+moneyK(r.group.sum)+'</span></div></td></tr>';}
      var tds='';
      if(r.frozen!==undefined){tds+='<td class="frozen">'+r.frozen+'</td>';}
      r.cells.forEach(function(c,ci){var col=d.cols[(r.frozen!==undefined?1:0)+ci];var rr=(col&&col.r)?' class="r"':'';tds+='<td'+rr+'>'+c+'</td>';});
      return '<tr'+(ri===(d.grouped?2:1)?' data-active="1"':'')+'>'+tds+'</tr>';
    }).join('');

    elContent.scrollTop=0;
  }

  /* surface switch (topbar tabs + rail) */
  function select(key){
    document.querySelectorAll('.surfaces button').forEach(function(b){b.setAttribute('aria-selected',b.getAttribute('data-s')===key?'true':'false')});
    document.querySelectorAll('.rail a[data-rail]').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-rail')===key)});
    render(key);
  }
  document.querySelectorAll('.surfaces button').forEach(function(b){b.addEventListener('click',function(){select(b.getAttribute('data-s'))})});
  document.querySelectorAll('.rail a[data-rail]').forEach(function(a){a.addEventListener('click',function(){select(a.getAttribute('data-rail'))})});

  /* hide scroll hint once user scrolls */
  var hint=document.getElementById('hint');
  elContent.addEventListener('scroll',function(){if(elContent.scrollTop>40)hint.classList.add('gone')},{passive:true});

  select('projects');
})();
</script>
</body>
</html>
